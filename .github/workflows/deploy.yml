name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_PREFIX: ghcr.io/dashu-baba/sponsor-request-approval-flow

jobs:
  ci-backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore SponsorshipApproval.sln

      - name: Build
        working-directory: backend
        run: dotnet build SponsorshipApproval.sln --no-restore --configuration Release

      - name: Format check
        working-directory: backend
        run: dotnet format SponsorshipApproval.sln --verify-no-changes --no-restore

      - name: Test
        working-directory: backend
        run: dotnet test SponsorshipApproval.sln --no-build --configuration Release --logger "console;verbosity=normal"

  ci-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Test
        working-directory: frontend
        run: npm run test

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/src/Api/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/api:latest

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/src/Api/Dockerfile
          target: migrator
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/migrator:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/migrator:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/frontend:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: actions/checkout@v4

      - name: Copy compose file to EC2 via SSM
        run: |
          CONTENT=$(base64 -w 0 docker-compose.prod.yml)
          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[\"echo '$CONTENT' | base64 -d > /opt/sponsorship-app/docker-compose.yml\"]" \
            --query "Command.CommandId" \
            --output text

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "set -euo pipefail",
              "TOKEN=$(aws ssm get-parameter --name /sponsorship-app/ghcr-token --with-decryption --query Parameter.Value --output text --region '"$AWS_REGION"')",
              "echo \"$TOKEN\" | docker login ghcr.io -u dashu-baba --password-stdin",
              "cd /opt/sponsorship-app",
              "docker compose pull",
              "docker compose up -d --remove-orphans",
              "docker image prune -f"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded"
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
            sleep 10
          done

          echo "Timed out waiting for deployment"
          exit 1
