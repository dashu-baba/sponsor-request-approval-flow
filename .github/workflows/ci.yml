name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore SponsorshipApproval.sln

      - name: Build (warnings as errors)
        working-directory: backend
        run: dotnet build SponsorshipApproval.sln --no-restore --configuration Release

      - name: Format check
        working-directory: backend
        run: dotnet format SponsorshipApproval.sln --verify-no-changes --no-restore

      - name: Test
        working-directory: backend
        run: dotnet test SponsorshipApproval.sln --no-build --configuration Release --logger "console;verbosity=normal"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npm run format:check

      - name: Build
        working-directory: frontend
        run: npm run build
