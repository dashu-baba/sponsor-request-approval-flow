services:
  db:
    image: postgres:17.9-alpine3.23
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

  migrator:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
      target: migrator-placeholder
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app-internal

  api:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
      target: runtime
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "80:8080"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

volumes:
  db-data:
  minio-data:

networks:
  app-internal:
    internal: true
