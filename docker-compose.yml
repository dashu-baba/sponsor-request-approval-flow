services:
  db:
    image: postgres:17.9-alpine3.23
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    volumes:
      - minio-data:/data
    healthcheck:
      # The minio image ships no curl/wget; bash + /dev/tcp gives a dependency-free liveness probe.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

  migrator:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
      target: migrator
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app-internal

  api:
    build:
      context: ./backend
      dockerfile: src/Api/Dockerfile
      target: runtime
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-internal

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "80:8080"
    env_file:
      - ${COMPOSE_ENV_FILE:-.env.example}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      # nginx is the only public-facing service: `edge` gives it host connectivity to publish
      # port 80, while `app-internal` lets it reach the API. db/minio/api stay internal-only.
      - edge
      - app-internal

volumes:
  db-data:
  minio-data:

networks:
  # Public edge network (has a host bridge) — only nginx attaches here to publish port 80.
  edge:
  # Back-of-house network with no outbound internet access; db/minio/api/migrator live here.
  app-internal:
    internal: true
